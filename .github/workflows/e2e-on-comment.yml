name: E2E on comment

on:
  workflow_call:
    inputs:
      e2e_repo:
        description: "Repo that receives the repository_dispatch and runs the suites"
        required: false
        type: string
        default: fasttrack-solutions/e2e
      trigger_phrase:
        description: "Comment substring that triggers the run"
        required: false
        type: string
        default: run e2e
    secrets:
      E2E_DISPATCH_TOKEN:
        description: "PAT/App token authorized to POST repository_dispatch to e2e_repo"
        required: true

permissions: {}

concurrency:
  group: e2e-on-comment-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, inputs.trigger_phrase) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Acknowledge the comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes || true

      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          HEAD_REPO=$(echo "$DATA" | jq -r .head.repo.full_name)
          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            gh pr comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "❌ E2E can only run against branches in this repository — fork PRs are not supported."
            echo "::error::PR head is in fork '$HEAD_REPO'; only same-repo branches are supported"
            exit 1
          fi
          echo "head_ref=$(echo "$DATA" | jq -r .head.ref)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$DATA" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"

      - name: Trigger E2E in the e2e repo
        env:
          GH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_REPO: ${{ inputs.e2e_repo }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api "repos/${E2E_REPO}/dispatches" \
            -f event_type=service-pr-e2e \
            -f "client_payload[service_repo]=${{ github.repository }}" \
            -f "client_payload[pr_number]=${{ github.event.issue.number }}" \
            -f "client_payload[head_ref]=$HEAD_REF" \
            -f "client_payload[head_sha]=$HEAD_SHA" \
            -f "client_payload[requester]=${{ github.event.comment.user.login }}"

      - name: Confirm dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🚀 E2E triggered against this branch. Results will be posted here when both suites finish."
