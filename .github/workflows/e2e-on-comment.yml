name: E2E on comment

# Reusable workflow: lets a developer comment "run e2e" on a service-repo PR to run
# the full E2E suite against that PR's branch. It POSTs a repository_dispatch to the
# e2e repo, which runs both suites (pinned-commits source build + last-stable-PV ECR)
# with the service swapped in, and posts the combined result back on the PR.
#
# Service repos call this with a minimal stub (see docs/e2e-on-comment.md):
#   jobs:
#     e2e:
#       if: github.event.issue.pull_request && contains(github.event.comment.body, 'run e2e')
#       permissions: { issues: write, pull-requests: write }
#       uses: fasttrack-solutions/ci/.github/workflows/e2e-on-comment.yml@main
#       secrets: inherit
#
# `github.repository` / `github.event.*` here reflect the CALLER's issue_comment event,
# so no PR/comment context needs to be passed in.

on:
  workflow_call:
    inputs:
      e2e_repo:
        description: "Repo that receives the repository_dispatch and runs the suites"
        required: false
        type: string
        default: fasttrack-solutions/e2e
      trigger_phrase:
        description: "Comment substring that triggers the run"
        required: false
        type: string
        default: run e2e
    secrets:
      E2E_DISPATCH_TOKEN:
        description: "PAT/App token authorized to POST repository_dispatch to e2e_repo"
        required: true

# Least-privilege, per-job (org-default GITHUB_TOKEN is restricted to contents:read,
# and a reusable workflow cannot elevate beyond its caller — the calling stub grants
# the same scopes).
permissions: {}

concurrency:
  group: e2e-on-comment-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    # Only on PR comments that contain the trigger phrase, and only from trusted authors.
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, inputs.trigger_phrase) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      issues: write          # react to the triggering comment
      pull-requests: write   # post the acknowledgement comment
    steps:
      - name: Acknowledge the comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes || true

      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          # The e2e side fetches the branch from this repo's origin, so a fork PR
          # would either fail or silently test a same-named upstream branch.
          HEAD_REPO=$(echo "$DATA" | jq -r .head.repo.full_name)
          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            gh pr comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "❌ E2E can only run against branches in this repository — fork PRs are not supported."
            echo "::error::PR head is in fork '$HEAD_REPO'; only same-repo branches are supported"
            exit 1
          fi
          echo "head_ref=$(echo "$DATA" | jq -r .head.ref)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$DATA" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"

      - name: Trigger E2E in the e2e repo
        env:
          GH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          # Via env, not inline interpolation: branch names may contain shell metacharacters.
          E2E_REPO: ${{ inputs.e2e_repo }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api "repos/${E2E_REPO}/dispatches" \
            -f event_type=service-pr-e2e \
            -f "client_payload[service_repo]=${{ github.repository }}" \
            -f "client_payload[pr_number]=${{ github.event.issue.number }}" \
            -f "client_payload[head_ref]=$HEAD_REF" \
            -f "client_payload[head_sha]=$HEAD_SHA" \
            -f "client_payload[requester]=${{ github.event.comment.user.login }}"

      - name: Confirm dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🚀 E2E triggered against this branch. Results will be posted here when both suites finish."
