name: Docker Build Service

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      tag-prefix:
        required: false
        type: string
        default: ""
      dockerfile:
        required: false
        type: string
        default: "./deployments/docker/Dockerfile"
      build-args:
        required: false
        type: string
        default: ""
      start-build-from:
        required: false
        type: string
        default: "0"
      git_fetch_submodules:
        required: false
        type: string
        default: "true"
      latest_tag:
        required: false
        type: string
        default: "false"
      dockerhub_username:
        description: "dockerhub username"
        required: false
        type: string
        default: "tazerr"
      multi_arch:
        description: "Build for both amd64 and arm64 (default: false, amd64 only)"
        required: false
        type: boolean
        default: false
    secrets:
      FT_SSH_KEY:
        required: true
      FT_BITBUCKET_KNOWN_HOSTS:
        required: true
      FT_ECR_AWS_ACCESS_KEY_ID:
        required: true
      FT_ECR_AWS_SECRET_ACCESS_KEY:
        required: true
      DOCKERHUB_PULL_TOKEN:
        required: true        

# GitHub Enterprise migration set the org-default GITHUB_TOKEN permissions to
# "restricted" (contents: read only). Reusable workflows cannot elevate beyond
# the caller, so we grant explicitly here:
#   - contents:       actions/checkout
#   - pull-requests:  docker-service.yml/create-manifest declares it
#   - checks:         dorny/test-reporter in golang-ci.yml
#   - id-token:       OIDC for any auth path that uses it
#   - packages:       safe default if anything pushes to ghcr.io (we use ECR)
permissions:
  contents: write
  pull-requests: write
  checks: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.image }}-${{ inputs.tag-prefix }}-${{ inputs.dockerfile }}-${{ inputs.build-args }}-${{ inputs.start-build-from }}-${{ inputs.git_fetch_submodules }}-${{ inputs.latest_tag }}-${{ inputs.dockerhub_username }}-${{ inputs.multi_arch }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-service:
    name: ${{ matrix.platform == 'linux/arm64' && 'build-service-arm64' || 'build-service' }}
    strategy:
      matrix:
        include: ${{ fromJSON(inputs.multi_arch && '[{"platform":"linux/amd64","runner":"ubuntu-latest"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]' || '[{"platform":"linux/amd64","runner":"ubuntu-latest"}]') }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Build & Publish
        id: build
        uses: fasttrack-solutions/ci/.github/actions/build-publish-docker@f11f6b2f3661031113fe96b888c4ac66a954fd87 # main
        with:
          image: ${{ inputs.image }}
          tag-prefix: ${{ inputs.tag-prefix }}
          dockerfile: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build-args }}
          ssh_key: ${{ secrets.FT_SSH_KEY }}
          ssh_known_hosts: ${{ secrets.FT_BITBUCKET_KNOWN_HOSTS }}
          ecr_aws_access_key_id: ${{ secrets.FT_ECR_AWS_ACCESS_KEY_ID }}
          ecr_aws_secret_key: ${{ secrets.FT_ECR_AWS_SECRET_ACCESS_KEY }}
          start-build-from: ${{ inputs.start-build-from }}
          git_fetch_submodules: ${{ inputs.git_fetch_submodules }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          latest_tag: ${{ inputs.latest_tag }}
          dockerhub_username: ${{ inputs.dockerhub_username }}
          dockerhub_pull_token: ${{ secrets.DOCKERHUB_PULL_TOKEN }}
          platform: ${{ matrix.platform }}

  create-manifest:
    needs: build-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # create-manifest assumes the ECR OIDC role (ci#86)
    steps:
      - name: Create multi-arch manifest
        uses: fasttrack-solutions/ci/.github/actions/create-manifest@32f1442a4eb6dbf5de88fb6674fca943a656c224 # comment fix (#88); re-pin to main HEAD on merge
        with:
          image: ${{ inputs.image }}
          start-build-from: ${{ inputs.start-build-from }}
          ecr_aws_access_key_id: ${{ secrets.FT_ECR_AWS_ACCESS_KEY_ID }}
          ecr_aws_secret_key: ${{ secrets.FT_ECR_AWS_SECRET_ACCESS_KEY }}
          dockerhub_username: ${{ inputs.dockerhub_username }}
          dockerhub_pull_token: ${{ secrets.DOCKERHUB_PULL_TOKEN }}
          latest_tag: ${{ inputs.latest_tag }}
          tag-prefix: ${{ inputs.tag-prefix }}
          multi_arch: ${{ inputs.multi_arch }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
