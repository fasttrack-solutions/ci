name: Grafana Dashboard Validate

on:
  workflow_call:
    inputs:
      dashboard-path:
        required: false
        type: string
        default: "grafana/dashboards"
      grafanactl-version:
        required: false
        type: string
        default: "v0.1.9"
    secrets:
      GRAFANA_SERVER:
        required: true
      GRAFANA_STACK_ID:
        required: true
      GRAFANA_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ inputs.dashboard-path }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: fasttrack-solutions/ci/.github/actions/grafana-dashboard-setup@0cbc311b90656a1837322ac9d5fe19a3c043700a # main
        with:
          grafana-server: ${{ secrets.GRAFANA_SERVER }}
          grafana-stack-id: ${{ secrets.GRAFANA_STACK_ID }}
          grafana-token: ${{ secrets.GRAFANA_TOKEN }}
          grafanactl-version: ${{ inputs.grafanactl-version }}
          dashboard-path: ${{ inputs.dashboard-path }}

      - name: Validate dashboards
        if: env.TEMP_DIR != ''
        run: grafanactl resources validate --path "$TEMP_DIR"
