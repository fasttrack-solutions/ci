name: Golang Security Scan
on:
  workflow_call:
    inputs:
      go-version:
        required: true
        type: string
        default: "~1.18"
      enable-vips:
        required: false
        type: boolean
        default: false
      go-sec-ignore-folders:
        required: false
        type: string
        default: ""
    secrets:
      FT_SSH_KEY:
        required: true
      FT_BITBUCKET_KNOWN_HOSTS:
        required: true
      ANTHROPIC_API_KEY:
        required: false
jobs:
  govulncheck:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Git config setup for bitbucket
        run: git config --global url."git@bitbucket.org:fasttrackdevteam".insteadOf "https://bitbucket.org/fasttrackdevteam"

      - name: Git config setup for github
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Update apt
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update -qq -o Acquire::Retries=3

      - name: Install libvips
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install --fix-missing -qq -o Acquire::Retries=3 libvips libvips-dev

      - name: Setting private repos for golang
        run: export GOPRIVATE=bitbucket.org/fasttrackdevteam,github.com/fasttrack-solutions

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.3.1
        with:
          key: ${{ secrets.FT_SSH_KEY }}
          known_hosts: ${{ secrets.FT_BITBUCKET_KNOWN_HOSTS }}

      - name: Setup Golang with cache
        uses: magnetikonline/action-golang-cache@v5
        with:
          go-version: ${{ inputs.go-version }}

      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
           go-version-input: ${{ inputs.go-version }}
           go-package: ./...

  gosec:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Git config setup for bitbucket
        run: git config --global url."git@bitbucket.org:fasttrackdevteam".insteadOf "https://bitbucket.org/fasttrackdevteam"

      - name: Git config setup for github
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Update apt
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update -qq -o Acquire::Retries=3

      - name: Install libvips
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install --fix-missing -qq -o Acquire::Retries=3 libvips libvips-dev

      - name: Setting private repos for golang
        run: export GOPRIVATE=bitbucket.org/fasttrackdevteam,github.com/fasttrack-solutions

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.3.1
        with:
          key: ${{ secrets.FT_SSH_KEY }}
          known_hosts: ${{ secrets.FT_BITBUCKET_KNOWN_HOSTS }}

      - name: Setup Golang with cache
        uses: magnetikonline/action-golang-cache@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Cache Go security tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-security-tools-${{ runner.os }}-${{ inputs.go-version }}-gosec

      - name: Install go sec
        run: |
          if ! command -v gosec &> /dev/null; then
            go install github.com/securego/gosec/v2/cmd/gosec@latest
          fi

      - name: Run gosec
        run: |
          if [ -n "${{ inputs.go-sec-ignore-folders }}" ]; then
            GO111MODULE=on gosec -exclude-dir=${{ inputs.go-sec-ignore-folders }} -exclude-generated ./...
          else
            GO111MODULE=on gosec -exclude-generated ./...
          fi

  golangci:
    name: lint
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - uses: actions/checkout@v5
      - name: Git config setup for github
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Setting private repos for golang
        run: export GOPRIVATE=bitbucket.org/fasttrackdevteam,github.com/fasttrack-solutions

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.3.1
        with:
          key: ${{ secrets.FT_SSH_KEY }}
          known_hosts: ${{ secrets.FT_BITBUCKET_KNOWN_HOSTS }}
      - name: Setup Golang with cache
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: Update apt
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update -qq -o Acquire::Retries=3

      - name: Install libvips
        if: ${{ inputs.enable-vips }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install --fix-missing -qq -o Acquire::Retries=3 libvips libvips-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=10m

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.88.0

      - name: Run TruffleHog
        run: |
          trufflehog git file://. \
            --since-commit="${{ github.event.pull_request.base.sha }}" \
            --only-verified \
            --json \
            --no-update \
            2>/tmp/trufflehog-stderr > trufflehog-findings.json || {
            echo "::error::TruffleHog scanner failed (exit $?). stderr:"
            cat /tmp/trufflehog-stderr
            exit 1
          }

      - name: Fail if verified secrets found
        run: |
          count=$(wc -l < trufflehog-findings.json)
          if [ "$count" -gt 0 ]; then
            echo "::error::TruffleHog found $count verified secret(s):"
            jq -r '"  \(.DetectorName) in \(.SourceMetadata.Data.Git.file // "unknown")"' \
              trufflehog-findings.json
            exit 1
          fi
          echo "TruffleHog: no verified secrets found."

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trufflehog-findings
          path: trufflehog-findings.json
          retention-days: 7

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip3 install semgrep==1.117.0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/golang \
            --config p/secrets \
            --json \
            --baseline-commit="${{ github.event.pull_request.base.sha }}" \
            --output semgrep-findings.json \
            . 2>/dev/null || true

      - name: Fail if findings
        run: |
          count=$(jq '.results | length' semgrep-findings.json)
          if [ "$count" -gt 0 ]; then
            echo "::error::Semgrep found $count issue(s):"
            jq -r '.results[] | "  [\(.extra.severity)] \(.check_id): \(.path):\(.start.line)"' \
              semgrep-findings.json
            exit 1
          fi
          echo "Semgrep: no findings."

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-findings
          path: semgrep-findings.json
          retention-days: 7

  security-deterministic:
    name: security-deterministic
    runs-on: ubuntu-latest
    needs: [trufflehog, semgrep]
    if: always()
    steps:
      - name: Check deterministic security jobs
        run: |
          th="${{ needs.trufflehog.result }}"
          sg="${{ needs.semgrep.result }}"
          echo "trufflehog: $th  semgrep: $sg"
          for result in "$th" "$sg"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Deterministic security check failed (trufflehog=$th semgrep=$sg)"
              exit 1
            fi
          done
          echo "All deterministic security checks passed."

  claude:
    name: claude-advisory
    runs-on: ubuntu-latest
    needs: [trufflehog, semgrep]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download TruffleHog findings
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: trufflehog-findings
        continue-on-error: true

      - name: Download Semgrep findings
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: semgrep-findings
        continue-on-error: true

      - name: Run Claude security scan
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/claude-security-scan.sh

  security:
    name: security
    runs-on: ubuntu-latest
    needs: [govulncheck, gosec, golangci]
    if: always()
    steps:
      - name: Check all security jobs passed
        run: |
          if [[ "${{ needs.govulncheck.result }}" != "success" ]] || \
             [[ "${{ needs.gosec.result }}" != "success" ]] || \
             [[ "${{ needs.golangci.result }}" != "success" ]]; then
            echo "One or more security checks failed:"
            echo "  govulncheck: ${{ needs.govulncheck.result }}"
            echo "  gosec: ${{ needs.gosec.result }}"
            echo "  golangci: ${{ needs.golangci.result }}"
            exit 1
          fi
          echo "All security checks passed!"
