name: Golang-CI

on:
  workflow_call:
    inputs:
      go-version:
        required: true
        type: string
        default: "~1.18"
      go-skip-build:
        required: false
        type: boolean
        default: false
      go-test-timeout:
        required: false
        type: string
        default: "10m"
      go-test-mysql-version:
        required: false
        type: string
        default: "8"
      enable-vips:
        required: false
        type: boolean
        default: false
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      python_pip_install:
        description: "install python packages"
        type: boolean
        default: false
      pkl_install:
        description: "install pkl"
        type: boolean
        default: false
      runner:
        description: "runner to be used by the workflow"
        required: false
        type: string
        default: "ubuntu-latest"
      go-test-tags:
        description: "Go build tags for test filtering (e.g. 'integration' or 'integration,e2e')"
        required: false
        type: string
        default: ""
      dockerhub_username:
        description: "dockerhub username"
        required: false
        type: string
        default: "tazerr"
    secrets:
      FT_SSH_KEY:
        required: true
      FT_BITBUCKET_KNOWN_HOSTS:
        required: true
      CODECOV_TOKEN:
        required: false
      DOCKERHUB_PULL_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  build:
    runs-on: ${{ inputs.runner }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Docker Hub login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

    - name: DHI registry login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: dhi.io
        username: ${{ inputs.dockerhub_username }}
        password: ${{ secrets.DOCKERHUB_PULL_TOKEN }}

    - name: Load Docker cache
      if: always()
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/docker-cache
        key: docker-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          docker-cache-${{ runner.os }}-${{ github.ref_name }}-
          docker-cache-${{ runner.os }}-main-
          docker-cache-${{ runner.os }}-

    - name: Git config setup for bitbucket
      run: git config --global url."git@bitbucket.org:fasttrackdevteam".insteadOf "https://bitbucket.org/fasttrackdevteam"

    - name: Git config setup for github
      run: git config --global url."git@github.com:".insteadOf https://github.com/

    - name: Setting private repos for golang
      run: export GOPRIVATE=bitbucket.org/fasttrackdevteam,github.com/fasttrack-solutions

    - name: Update apt
      if: ${{ inputs.enable-vips }}
      env:
        DEBIAN_FRONTEND: noninteractive
      run: 
        sudo apt-get update -qq -o Acquire::Retries=3

    - name: Install libvips
      if: ${{ inputs.enable-vips }}
      env:
        DEBIAN_FRONTEND: noninteractive
      run:
        # we only need the library
        sudo apt-get install --fix-missing -qq -o Acquire::Retries=3
          libvips libvips-dev       

    - name: Install SSH Key
      uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2.8.1
      with:
        key: ${{ secrets.FT_SSH_KEY }}
        known_hosts: ${{ secrets.FT_BITBUCKET_KNOWN_HOSTS }}
    - name: Setup Golang
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        cache: false
        go-version: ${{ inputs.go-version }}

    - name: Determine Golang cache paths and construct cache key
      id: golang-with-cache
      shell: bash
      run: |
        echo "build-cache-path=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
        echo "module-cache-path=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
        cacheKeyRoot="${{ runner.os }}-golang-"
        echo "cache-key-restore=$cacheKeyRoot" >> "$GITHUB_OUTPUT"
        echo "cache-key=${cacheKeyRoot}${{ hashFiles('**/go.sum') }}" >> "$GITHUB_OUTPUT"

    - name: Restore Golang cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.golang-with-cache.outputs.build-cache-path }}
          ${{ steps.golang-with-cache.outputs.module-cache-path }}
        key: ${{ steps.golang-with-cache.outputs.cache-key }}
        restore-keys: |
          ${{ steps.golang-with-cache.outputs.cache-key-restore }}

    - name: Setup Python with cache
      if: inputs.python_pip_install == true
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: pip install
      if: inputs.python_pip_install == true
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt       

    - name: Install pkl
      if: inputs.pkl_install == true
      uses: pkl-community/setup-pkl@a862c198115338598d769aaf03f5fa8c5123036e # v0.0.8
      with:
        pkl-version: 0.25.2

    - name: Download Go modules
      if: inputs.go-skip-build == false
      run: go mod download
      
    - name: Verify Go modules
      if: inputs.go-skip-build == false
      run: go mod verify
      
    - name: Build
      if: inputs.go-skip-build == false
      run: go build ./...

    - name: Test Dir
      run: mkdir test-reports

    - name: Cache Go tools
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/go/bin
        key: go-tools-${{ runner.os }}-gotestsum-v1.12.3

    - name: Get gotestsum
      run: |
        if [ ! -f ~/go/bin/gotestsum ]; then
          go install gotest.tools/gotestsum@v1.12.3
        fi

    - name: Run Test
      run: MYSQL_VERSION=${{ inputs.go-test-mysql-version }} gotestsum --junitfile test-reports/report.xml -- -timeout ${{ inputs.go-test-timeout }} -parallel=5 -covermode=atomic -coverprofile=cover.out ${{ inputs.go-test-tags && format('-tags={0}', inputs.go-test-tags) || '' }} ./...

    - name: Test Report
      uses: dorny/test-reporter@6c357194179c694acfcad2100dbf27c5b9b0d5e0 # v1.9.1
      if: success() || failure()    # run this step even if previous step failed
      with:
        name: Unit tests            # Name of the check run which will be created
        path: test-reports/*.xml   # Path to test results
        reporter: java-junit
    - name: Upload coverage reports to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: Save Golang cache
      if: always()
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ steps.golang-with-cache.outputs.build-cache-path }}
          ${{ steps.golang-with-cache.outputs.module-cache-path }}
        key: ${{ steps.golang-with-cache.outputs.cache-key }}

    - name: Save Docker cache
      if: always()
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/docker-cache
        key: docker-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
