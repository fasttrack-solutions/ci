name: "Create Multi-Arch Manifest"
description: "Create and push a multi-arch manifest from platform-specific images"
inputs:
  image:
    description: "Image name (without registry)"
    required: true
  start-build-from:
    description: "Build number offset"
    required: false
    default: "0"
  ecr_aws_access_key_id:
    description: "ECR AWS access key ID"
    required: true
  ecr_aws_secret_key:
    description: "ECR AWS secret key"
    required: true
  ecr_role_arn:
    description: "ECR OIDC role to assume (default: FT github-actions-ecr). Empty falls back to static keys."
    required: false
    default: "arn:aws:iam::745106446559:role/github-actions-ecr"
  dockerhub_username:
    description: "Docker Hub username"
    required: true
    default: "tazerr"
  dockerhub_pull_token:
    description: "Docker Hub pull token"
    required: true
  latest_tag:
    description: "Also create latest manifest"
    required: false
    default: "false"
  tag-prefix:
    description: "Tag prefix"
    required: false
    default: ""
  github_token:
    description: "GitHub token for PR detection"
    required: false
    default: ""
  multi_arch:
    description: "Whether to include ARM64 in the manifest (default: false, amd64 only)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    # OIDC by default (assume github-actions-ecr); static keys only if ecr_role_arn is emptied.
    # Requires id-token: write on the caller (all current callers grant it).
    - name: Configure AWS credentials (OIDC)
      if: inputs.ecr_role_arn != ''
      uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
      with:
        role-to-assume: ${{ inputs.ecr_role_arn }}
        aws-region: eu-west-1
    - name: Configure AWS credentials (static fallback)
      if: inputs.ecr_role_arn == ''
      uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
      with:
        aws-access-key-id: ${{ inputs.ecr_aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.ecr_aws_secret_key }}
        aws-region: eu-west-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

    - name: Docker Hub login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_pull_token }}

    - name: DHI registry login
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: dhi.io
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_pull_token }}

    - name: Set build number
      shell: bash
      env:
        RUN_NUMBER: ${{ github.run_number }}
        START_FROM: ${{ inputs.start-build-from }}
      run: |
        BUILD_NUMBER=$(($RUN_NUMBER + $START_FROM))
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

    - uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
      id: findPr
      with:
        state: open

    - name: Create and push manifest
      shell: bash
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        IMAGE="${{ inputs.image }}"
        PREFIX="${{ inputs.tag-prefix }}"
        MULTI_ARCH="${{ inputs.multi_arch }}"

        # Determine the base tag (same logic as build action)
        if [[ "${{ github.ref }}" == "refs/heads/master" || "${{ github.ref }}" == "refs/heads/main" ]]; then
          TAG="${PREFIX}oneclick-${{ env.BUILD_NUMBER }}"
        elif [[ "${{ github.ref }}" == *"release"* ]]; then
          TAG="${PREFIX}oneclickrelease-${{ env.BUILD_NUMBER }}"
        elif [[ -n "${{ steps.findPr.outputs.pr }}" ]]; then
          TAG="${PREFIX}oneclickpr-${{ steps.findPr.outputs.pr }}-${{ env.BUILD_NUMBER }}"
        else
          TAG="${PREFIX}oneclick-${{ env.BUILD_NUMBER }}"
        fi

        AMD64_IMAGE="${REGISTRY}/${IMAGE}:${TAG}-amd64"
        ARM64_IMAGE="${REGISTRY}/${IMAGE}:${TAG}-arm64"
        MANIFEST_IMAGE="${REGISTRY}/${IMAGE}:${TAG}"

        echo "Creating manifest for ${MANIFEST_IMAGE}"
        echo "  - AMD64: ${AMD64_IMAGE}"

        # Use multi_arch input to determine whether to include ARM64
        if [[ "$MULTI_ARCH" == "true" ]]; then
          echo "  - ARM64: ${ARM64_IMAGE}"
          docker manifest create "${MANIFEST_IMAGE}" \
            "${AMD64_IMAGE}" \
            "${ARM64_IMAGE}"
          docker manifest annotate "${MANIFEST_IMAGE}" "${AMD64_IMAGE}" --os linux --arch amd64
          docker manifest annotate "${MANIFEST_IMAGE}" "${ARM64_IMAGE}" --os linux --arch arm64
        else
          echo "  - ARM64: not included (single-arch build)"
          docker manifest create "${MANIFEST_IMAGE}" \
            "${AMD64_IMAGE}"
          docker manifest annotate "${MANIFEST_IMAGE}" "${AMD64_IMAGE}" --os linux --arch amd64
        fi

        # Push the manifest
        docker manifest push "${MANIFEST_IMAGE}"

        echo "Successfully pushed manifest: ${MANIFEST_IMAGE}"
        docker manifest inspect "${MANIFEST_IMAGE}"

    - name: Compute comment label
      if: github.event_name == 'pull_request' && steps.findPr.outputs.number > 0 && inputs.github_token != ''
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        PREFIX: ${{ inputs.tag-prefix }}
      run: |
        if [[ -n "$PREFIX" ]]; then
          echo "SERVICE_LABEL=${PREFIX%-}" >> "$GITHUB_ENV"
        else
          echo "SERVICE_LABEL=$IMAGE" >> "$GITHUB_ENV"
        fi

    - name: Comment OneClick PR image
      if: github.event_name == 'pull_request' && steps.findPr.outputs.number > 0 && inputs.github_token != ''
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
      with:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        header: "OneClick PR tag - ${{ inputs.image }}${{ inputs.tag-prefix != '' && format('-{0}', inputs.tag-prefix) || '' }}"
        message: |
          ## 🚀 OneClick PR image — ${{ env.SERVICE_LABEL }}

          Latest build for this PR:

          `${{ inputs.tag-prefix }}oneclickpr-${{ steps.findPr.outputs.pr }}-${{ env.BUILD_NUMBER }}`

    - name: Create and push latest manifest
      if: inputs.latest_tag == 'true'
      shell: bash
      run: |
        REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        IMAGE="${{ inputs.image }}"
        PREFIX="${{ inputs.tag-prefix }}"
        MULTI_ARCH="${{ inputs.multi_arch }}"

        AMD64_IMAGE="${REGISTRY}/${IMAGE}:${PREFIX}latest-amd64"
        ARM64_IMAGE="${REGISTRY}/${IMAGE}:${PREFIX}latest-arm64"
        MANIFEST_IMAGE="${REGISTRY}/${IMAGE}:${PREFIX}latest"

        echo "Creating latest manifest for ${MANIFEST_IMAGE}"

        # Use multi_arch input to determine whether to include ARM64
        if [[ "$MULTI_ARCH" == "true" ]]; then
          docker manifest create "${MANIFEST_IMAGE}" \
            "${AMD64_IMAGE}" \
            "${ARM64_IMAGE}"
          docker manifest annotate "${MANIFEST_IMAGE}" "${AMD64_IMAGE}" --os linux --arch amd64
          docker manifest annotate "${MANIFEST_IMAGE}" "${ARM64_IMAGE}" --os linux --arch arm64
        else
          docker manifest create "${MANIFEST_IMAGE}" \
            "${AMD64_IMAGE}"
          docker manifest annotate "${MANIFEST_IMAGE}" "${AMD64_IMAGE}" --os linux --arch amd64
        fi

        docker manifest push "${MANIFEST_IMAGE}"

        echo "Successfully pushed latest manifest: ${MANIFEST_IMAGE}"
